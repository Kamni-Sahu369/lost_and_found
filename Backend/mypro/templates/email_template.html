<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
        }
        .header {
            background: #4caf50;
            padding: 10px;
            color: white;
            border-radius: 8px 8px 0 0;
            text-align: center;
            font-size: 20px;
        }
        .content {
            margin-top: 10px;
            font-size: 16px;
        }
        .otp-box {
            background: #e0f7fa;
            padding: 10px;
            font-size: 24px;
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Welcome to Our Platform</div>
        <div class="content">
            <p>Hi {{ name }},</p>
            <p>Thank you for registering with us!</p>
            <p>Your One Time Password (OTP) is:</p>
            
            <div class="otp-box">{{ otp }}</div>

            <p>This OTP is valid for a limited time. Please do not share it with anyone.</p>
            <br/>
            <p>Best regards,<br/>The Team</p>
        </div>
    </div>
</body>
</html>
